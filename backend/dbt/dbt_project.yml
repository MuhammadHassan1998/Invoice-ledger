name: invoice_ledger
version: "1.0.0"
config-version: 2

profile: invoice_ledger

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

seeds:
  invoice_ledger:
    raw_invoices:
      +csv_delimiter: ","
      +csv_quote: '"'
      +nullstr: ''

models:
  invoice_ledger:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
